# Configuration nginx pour servir la SPA FutureKawa (build Vite).
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA : toute route inconnue retombe sur index.html (routage côté client).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache long pour les assets hashés par Vite (JS/CSS immuables).
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
